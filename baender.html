<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bände – Auswahl</title>
<link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body class="BG2">
<div class="page">

  <div class="header">
    <button class="btn" onclick="location.href='./index.html'">← Zurück</button>
    <div class="brand">Bände</div>
    <nav class="nav">
      <a href="./stoffe.html">Stoffe</a>
      <a href="./mischungen.html">Mischungen</a>
      <a href="./baender.html">Bände</a>
    </nav>
  </div>

  <p class="sub">Automatische Auswahl. HTML öffnet im gleichen Fenster, PDF im neuen Tab.</p>

  <div class="toolbar">
    <label>Band wählen:</label>
    <select id="s" class="btn"></select>
    <button class="btn" id="h">HTML öffnen</button>
    <button class="btn" id="p">PDF öffnen</button>
  </div>

  <div class="footer-note">
    <div>BG2 aktiv</div>
    <div><a href="./index.html">Start</a></div>
  </div>

</div>

<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>

<script>
// Lädt JSON-Listen
async function loadList(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch (e) {
    console.error("Fehler beim Laden:", url, e);
    return [];
  }
}

// Dropdown dynamisch erstellen
async function buildBands() {
  const htmlList = await loadList("./bands/list_html.json");
  const pdfList  = await loadList("./data/pdfs/list_pdf.json");

  const dropdown = document.getElementById("s");
  dropdown.innerHTML = "";

  htmlList.forEach(name => {
    const clean = name.replace(/\.[^/.]+$/, ""); // Endung entfernen
    const opt = document.createElement("option");
    opt.value = clean;
    opt.textContent = clean; 
    dropdown.appendChild(opt);
  });

  // Buttons verkabeln
  document.getElementById("h").onclick = () => {
    const id = dropdown.value;
    location.href = `./bands/${id}.html`;
  };

  document.getElementById("p").onclick = () => {
    const id = dropdown.value;
    window.open(`./data/pdfs/${id}.pdf`, "_blank");
  };
}

buildBands();
</script>

</body>
</html>
