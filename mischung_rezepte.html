<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Rezeptansicht</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; color: #333; }
        .page { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 8px; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        /* ID oben rechts */
        .rid { position: absolute; top: 20px; right: 20px; font-size: 0.85em; color: #999; font-family: monospace; font-weight: bold; }
        
        .header { display: flex; gap: 25px; margin-bottom: 30px; align-items: flex-start; }
        .img-box { width: 180px; height: 180px; background: #eee; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid #ddd; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .title { margin: 0; font-size: 2.2em; color: #000; padding-right: 120px; }
        .sec { border-bottom: 2px solid #eee; margin: 30px 0 15px; font-weight: bold; font-size: 1.2em; color: #444; }
        
        /* Zutaten mit "-" */
        .ing { list-style: none; padding: 0; margin: 0; }
        .ing li { padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        
        /* Textblöcke mit Zeilenumbrüchen */
        .txt { white-space: pre-wrap; background: #f9f9f9; padding: 15px; border-left: 4px solid #ccc; border-radius: 4px; margin-top: 5px; }

        @media print { .no-print { display: none; } .page { box-shadow: none; width: 100%; page-break-after: always; } }
    </style>
</head>
<body>
    <div class="page">
        <div id="rid-display" class="rid"></div>
        <a href="./mischungen.html" class="no-print" style="color:#007bff; text-decoration:none; font-weight:bold;">&larr; Zurück zur Suche</a>
        <div id="content-area">Lade Rezeptdaten...</div>
    </div>

    <script src="./assets/js/util.js"></script>
    <script>
    (async () => {
        const container = document.getElementById('content-area');
        const ridDisplay = document.getElementById('rid-display');
        
        try {
            const allData = await window.$util.loadRecipes();
            const params = new URLSearchParams(location.search);
            const ids = (params.get('ids') || params.get('id') || "").split(',').filter(Boolean);
            
            // WICHTIG: Spaltennamen finden (Groß-/Kleinschreibung ignorieren)
            const keys = Object.keys(allData[0] || {});
            const getCol = (name) => keys.find(k => k.toLowerCase().replace(/_/g, '') === name.toLowerCase()) || keys[0];

            // Wir suchen nach den Kernspalten
            const COL_ID = getCol('mixid'); 
            const COL_NAME = getCol('namedeutsch');
            const COL_ING = getCol('zutatenmengenstructured');
            const COL_INST = getCol('herstellungzubereitung');

            // Daten filtern
            const byId = new Map(allData.map(r => [String(r[COL_ID]).trim(), r]));
            const selected = ids.map(id => byId.get(id.trim())).filter(Boolean);

            if (!selected.length) { 
                container.innerHTML = "Mischung nicht gefunden. Bitte prüfen Sie, ob die ID in der CSV existiert."; 
                return; 
            }

            container.innerHTML = selected.map((r, i) => {
                const id = String(r[COL_ID]).trim();
                if (i === 0) ridDisplay.textContent = "ID: " + id; // ID oben rechts
                
                // Pfad-Logik wie in der funktionierenden Version
                const imagePath = `./assets/img/mischungen/${id}.jpg`;
                
                // Zutaten Formatierung
                const ingredients = r[COL_ING] ? String(r[COL_ING]).split('|').map(z => `<li>- ${z.trim()}</li>`).join('') : '';
                
                // Textblöcke Formatierung
                const format = (val) => val ? `<div class="txt">${String(val).replace(/\|/g, '\n')}</div>` : '';

                return `
                    <div style="margin-bottom: 60px;">
                        <div class="header">
                            <div class="img-box">
                                <img src="${imagePath}" 
                                     onerror="this.onerror=null; this.src='https://via.placeholder.com/180?text=Bild+fehlt'; console.log('Fehler beim Laden von: ' + this.src);">
                            </div>
                            <div>
                                <h1 class="title">${r[COL_NAME] || 'Mischung ohne Name'}</h1>
                                <div style="color:#666; margin-top:10px;">
                                    <strong>Herkunft:</strong> ${r[getCol('regionnorm')] || '-'}<br>
                                    <strong>Sensorik:</strong> ${r[getCol('sensorikmulti')] || '-'}
                                </div>
                            </div>
                        </div>
                        <div class="sec">Zutaten & Mengen</div>
                        <ul class="ing">${ingredients}</ul>
                        
                        <div class="sec">Herstellung & Zubereitung</div>
                        ${format(r[COL_INST])}
                    </div>
                `;
            }).join('');

            // PDF Druck-Automatik
            if (params.get('print') === '1') {
                setTimeout(() => window.print(), 1200);
            }

        } catch (e) {
            container.innerHTML = "Kritischer Fehler beim Laden: " + e;
            console.error(e);
        }
    })();
    </script>
</body>
</html>
