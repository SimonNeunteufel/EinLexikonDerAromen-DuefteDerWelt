<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>
<script>
(async () => {
    let allData = [];
    const container = document.getElementById('recipes');
    
    // START: Prüfe, ob die Daten überhaupt geladen werden können
    try {
        allData = await window.$util.loadRecipes(); 
    } catch (e) {
        // Kritischer Fehler beim Laden der CSV oder Parsen
        container.innerHTML = `<p><strong>KRITISCHER FEHLER beim Laden der Daten (loadRecipes):</strong></p><p>Bitte prüfen, ob die Datei 'MasterRecipes.csv' existiert und das Semikolon-Trennzeichen korrekt ist.</p><p>Details: ${e}</p>`;
        return;
    }

    if (!allData || allData.length === 0) {
        container.innerHTML = '<p>Daten geladen, aber keine Rezepte in der Datei gefunden.</p>';
        return;
    }

    // --- DATEN SIND GELADEN (Die Seite sollte jetzt NICHT mehr leer sein) ---

    // Wir laden hier nur das erste Rezept, um den Absturz beim Rendering zu vermeiden
    const r = allData[0];
    const S = window.$util.safe; 

    // Mapping nur für die wichtigsten Spalten, die immer existieren sollten
    const KEYS = Object.keys(r);
    const findCol = (candidates) => candidates.find(c => KEYS.includes(c.toLowerCase())) || null;

    const COL_ID = findCol(['mix_id', 'id']);
    const COL_NAME = findCol(['name_deutsch', 'mix_name']);

    if (!COL_ID || !COL_NAME) {
         container.innerHTML = `<p><strong>FEHLER:</strong> Spalten 'MIX_ID' und/oder 'NAME_DEUTSCH' wurden in der CSV nicht gefunden. Gefundene Header: ${KEYS.join(', ')}</p>`;
         return;
    }

    const name = S(r[COL_NAME] || 'Unbekannter Name');
    const id = S(r[COL_ID] || 'Unbekannte ID');
    
    // --- ABSICHERUNG: Gib die minimalen Daten aus, die den Absturz überlebt haben ---
    container.innerHTML = `
        <div style="background: #e6ffe6; padding: 15px; border: 1px solid #00aa00;">
            <p><strong>✅ Erfolgreich geladen:</strong> Das Skript hat die Daten ohne Absturz geladen.</p>
            <p><strong>Erstes Rezept gefunden:</strong></p>
            <ul>
                <li><strong>Name:</strong> ${name}</li>
                <li><strong>ID:</strong> ${id}</li>
                <li>Anzahl Datensätze: ${allData.length}</li>
            </ul>
            <p>Wenn dies angezeigt wird, liegt der Fehler nur noch in der <strong>Navigations- und Rendering-Logik</strong> (die ich in der letzten Antwort bereitgestellt habe). Bitte vergewissere dich, dass du auch die **HTML-Struktur (div id="recipes" und div id="recipe-navigation")** im Body der Seite hast.</p>
        </div>
    `;
    
    // WENN DIESER TEST FUNKTIONIERT, MÜSSEN WIR ZURÜCK ZUM VOLLEM SCRIPT
    // ABER ZUERST: TESTEN!
    
})();
</script>
