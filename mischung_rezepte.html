<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Lexikon – Rezeptansicht</title>
    <style>
        :root { --t: #f7fafc; --bg: rgba(255, 255, 255, 1); --b: #00000020; --accent: #007bff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, sans-serif; color: #333; background: #f4f4f4; line-height: 1.5; }
        .page { max-width: 900px; margin: 20px auto; padding: 40px; background: var(--bg); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        
        /* Navigation & Header */
        .btn-back { display: block; margin-bottom: 20px; color: var(--accent); text-decoration: none; }
        .recipe-header { display: flex; gap: 30px; margin-bottom: 40px; position: relative; }
        .recipe-title-group { flex-grow: 1; }
        .recipe-title { margin: 0; font-size: 2.5rem; color: #000; }
        
        /* FIX: ID oben rechts */
        .recipe-id { position: absolute; top: 0; right: 0; font-size: 0.9rem; color: #888; font-family: monospace; }
        
        .recipe-img-wrap { width: 180px; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--b); flex-shrink: 0; }
        .recipe-img { width: 100%; height: 100%; object-fit: cover; }
        .meta-info { opacity: 0.7; margin-top: 10px; }

        /* Inhalts-Blöcke */
        .section-title { font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 8px; margin: 30px 0 15px 0; color: #000; font-weight: bold; }
        .block-text { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #ddd; white-space: pre-wrap; }
        .ingredients-list { list-style: none; padding: 0; margin: 0; }
        .ingredients-list li { padding: 5px 0; border-bottom: 1px solid #eee; }

        @media print { .btn-back, #recipe-navigation { display: none; } .page { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="page">
    <a href="./mischungen.html" class="btn-back">← Zurück zur Suche</a>
    <div id="recipe-navigation" style="margin-bottom: 20px; display: flex; gap: 10px;"></div>
    <div id="recipes">Lade Daten...</div>
</div>

<script src="./assets/js/util.js"></script>
<script>
(async () => {
    const container = document.getElementById('recipes');
    const navContainer = document.getElementById('recipe-navigation');
    const S = window.$util.safe;

    try {
        const allData = await window.$util.loadRecipes();
        const params = new URLSearchParams(location.search);
        const ids = (params.get('ids') || params.get('id') || "").split(',').filter(Boolean);

        const byId = new Map(allData.map(r => [r.mix_id || r.id_neu, r]));
        const currentData = ids.length > 0 ? ids.map(id => byId.get(id)).filter(Boolean) : [allData[0]];

        function render(index) {
            const r = currentData[index];
            const keys = Object.keys(r);
            const find = (c) => c.find(k => keys.includes(k.toLowerCase())) || null;

            const COL = {
                name: find(['name_deutsch', 'mix_name']),
                origin: find(['region_norm', 'herkunft']),
                sensorik: find(['sensorik', 'sensorik_multi']),
                zutaten: find(['zutaten_mengen_structured', 'zutaten_liste']),
                anleitung: find(['herstellung_zubereitung', 'anleitung']),
                prozess: find(['herstellungsprozess']),
                temp: find(['temperaturfuehrung']),
                reife: find(['reifezeit_lagerzeit']),
                anwendung: find(['anwendung']),
                id: find(['mix_id', 'id_neu'])
            };

            // FIX: Zutaten-Trenner "|" zu "-"
            const zutatenHtml = r[COL.zutaten] ? 
                `<ul class="ingredients-list">${r[COL.zutaten].split('|').map(z => `<li>- ${S(z)}</li>`).join('')}</ul>` : '';

            // FIX: Blöcke Trenner "|" zu Zeilenumbruch
            const formatBlock = (val) => val ? `<div class="block-text">${S(val).replace(/\|/g, '\n')}</div>` : '';

            container.innerHTML = `
                <article class="recipe">
                    <div class="recipe-id">ID: ${S(r[COL.id])}</div>
                    <div class="recipe-header">
                        <div class="recipe-img-wrap">
                            <img class="recipe-img" src="./assets/img/mischungen/${r[COL.id]}.jpg" 
                                 onerror="this.src='https://via.placeholder.com/200?text=Kein+Bild'">
                        </div>
                        <div class="recipe-title-group">
                            <h1 class="recipe-title">${S(r[COL.name])}</h1>
                            <div class="meta-info">
                                <strong>Herkunft:</strong> ${S(r[COL.origin])}<br>
                                <strong>Sensorik:</strong> ${S(r[COL.sensorik])}
                            </div>
                        </div>
                    </div>

                    <h3 class="section-title">Zutaten & Mengen</h3>
                    ${zutatenHtml}
                    
                    ${r[COL.anleitung] ? `<h3 class="section-title">Herstellung / Zubereitung (Anleitung)</h3>${formatBlock(r[COL.anleitung])}` : ''}
                    ${r[COL.prozess] ? `<h3 class="section-title">Herstellungsprozess</h3>${formatBlock(r[COL.prozess])}` : ''}
                    ${r[COL.temp] ? `<h3 class="section-title">Temperaturführung</h3>${formatBlock(r[COL.temp])}` : ''}
                    ${r[COL.reife] ? `<h3 class="section-title">Reifezeit / Lagerzeit</h3>${formatBlock(r[COL.reife])}` : ''}
                    ${r[COL.anwendung] ? `<h3 class="section-title">Anwendung</h3>${formatBlock(r[COL.anwendung])}` : ''}
                </article>
            `;

            // Nav-Update
            if (currentData.length > 1) {
                navContainer.innerHTML = `
                    <button onclick="window.renderRecipe(${index-1})" ${index===0?'disabled':''}>← Zurück</button>
                    <span>${index+1} / ${currentData.length}</span>
                    <button onclick="window.renderRecipe(${index+1})" ${index===currentData.length-1?'disabled':''}>Weiter →</button>
                `;
            }
        }

        window.renderRecipe = render;
        render(0);

    } catch (e) {
        container.innerHTML = `<p>Fehler: ${e}</p>`;
    }
})();
</script>
</body>
</html>
