<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>
<script>
(async () => {
    let allData = [];
    const container = document.getElementById('recipes');
    const S = window.$util.safe;

    // --- DATENLADUNG ---
    try {
        allData = await window.$util.loadRecipes(); 
    } catch (e) {
        container.innerHTML = `<p>KRITISCHER FEHLER beim Laden der Daten (loadRecipes): ${e}</p>`;
        return;
    }

    if (!allData || allData.length === 0) {
        container.innerHTML = '<p>Daten geladen, aber keine Rezepte in der Datei gefunden.</p>';
        return;
    }

    // --- MAPPING (Minimal) ---
    const r = allData[0]; // Nur das erste Rezept laden
    const KEYS = Object.keys(r);
    const findCol = (candidates) => candidates.find(c => KEYS.includes(c.toLowerCase())) || null;

    const COL_NAME = findCol(['name_deutsch', 'mix_name']);
    const COL_ID = findCol(['mix_id', 'id']);
    const COL_ZUTATEN = findCol(['zutaten_mengen_structured', 'zutaten_liste']);

    if (!COL_ID || !COL_NAME) {
         container.innerHTML = `<p>FEHLER: Spalten 'MIX_ID' und/oder 'NAME_DEUTSCH' wurden in der CSV nicht gefunden. Gefundene Header: ${KEYS.join(', ')}</p>`;
         return;
    }

    // --- ZUTATEN HELPER ---
    function ingredientList(txt) {
        if (!txt) return '';
        // Sucht nach Pipe (|) oder Semikolon (;)
        const items = (txt + '').split(/\||;/).map(s => s.trim()).filter(Boolean); 
        if (!items.length) return '';
        return '<ul style="list-style: disc inside; padding-left: 20px;">' +
            items.map(x => '<li>' + S(x) + '</li>').join('') +
            '</ul>';
    }

    // --- RENDERING DES ERSTEN REZEPTS OHNE URL-CHECK ---
    const name = S(r[COL_NAME] || 'Unbekannt');
    const id = S(r[COL_ID] || 'N/A');
    const zutaten = COL_ZUTATEN ? ingredientList(S(r[COL_ZUTATEN])) : 'Zutaten-Spalte nicht gefunden.';

    container.innerHTML = `
        <article style="border: 2px solid green; padding: 20px;">
            <p style="color: green;"><strong>✅ TEST ERFOLGREICH:</strong> Daten wurden geladen!</p>
            <h2 style="color: #333;">${name}</h2>
            <p><strong>ID:</strong> ${id}</p>
            <p><strong>Zutaten (Test):</strong></p>
            ${zutaten}
            <p style="margin-top: 15px;">Wenn du diesen Text siehst, liegt der Fehler nur noch in der <strong>URL-Analyse (Navigation)</strong>.</p>
        </article>
    `;
    
    // Deaktiviere das Navigationselement, da wir nur ein Element anzeigen
    const navContainer = document.getElementById('recipe-navigation');
    if(navContainer) navContainer.style.display = 'none';

})();
</script>
