<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1"> 
    <title>Mischungs Rezepte</title>
    <style>
        /* Eigenständiges Design, um Konflikte mit der styles.css zu vermeiden */
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; line-height: 1.5; }
        .page { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
        
        /* FIX: ID oben rechts positionieren */
        .recipe-id-top { position: absolute; top: 20px; right: 20px; font-size: 0.9em; color: #999; font-family: monospace; }
        
        .recipe { margin-bottom: 30px; }
        .recipe-header { display: flex; align-items: flex-start; margin-bottom: 30px; gap: 20px; }
        
        /* Bild-Container wie in der funktionierenden Version */
        .recipe-img-wrap { width: 180px; height: 180px; flex-shrink: 0; background-color: #eee; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
        .recipe-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .recipe-header-text { flex-grow: 1; padding-right: 100px; }
        .recipe-title { margin: 0 0 10px 0; font-size: 2.2em; color: #000; }
        .recipe-meta { font-size: 0.95em; color: #666; }
        
        .section-title { border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 30px; margin-bottom: 15px; color: #000; font-weight: bold; }
        
        /* FIX: Zutaten-Liste mit "-" anstelle von Bullets */
        .ingredients-list { list-style: none; padding: 0; margin: 0; }
        .ingredients-list li { margin-bottom: 5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 2px; }
        
        /* FIX: Box für Textblöcke mit Zeilenumbrüchen */
        .block-text { white-space: pre-wrap; padding: 15px; background: #f9f9f9; border-left: 4px solid #ccc; border-radius: 4px; margin: 10px 0; }
        
        .nav-link { text-decoration: none; color: #007bff; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        #recipe-navigation button { padding: 8px 16px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 6px; font-weight: bold; }
        #recipe-navigation button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="page">
    <a href="./mischungen.html" class="nav-link">&larr; Zurück zur Suche</a>
    
    <div id="recipe-navigation" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        </div>
    
    <div id="recipes">
        <p>Daten werden geladen...</p>
    </div>
</div>

<script src="./assets/js/util.js"></script>
<script>
(async () => {
    let allData = [];
    let currentData = [];
    let currentIndex = -1;
    
    const container = document.getElementById('recipes');
    const navContainer = document.getElementById('recipe-navigation');
    const S = window.$util.safe;

    try {
        allData = await window.$util.loadRecipes(); 
        if (!allData.length) throw "Keine Daten gefunden";

        const params = new URLSearchParams(window.location.search);
        const ids = (params.get('ids') || params.get('id') || '').split(',').filter(Boolean);
        
        const byId = new Map(allData.map(r => [r.mix_id || r.id_neu, r]));
        currentData = ids.length ? ids.map(id => byId.get(id)).filter(Boolean) : [allData[0]];

        window.render = (index) => {
            currentIndex = index;
            const r = currentData[index];
            const keys = Object.keys(r);
            const find = (c) => c.find(k => keys.includes(k.toLowerCase())) || null;

            const COL = {
                id: find(['mix_id', 'id_neu']),
                name: find(['name_deutsch', 'mix_name']),
                origin: find(['region_norm', 'herkunft']),
                sensorik: find(['sensorik', 'sensorik_multi']),
                zutaten: find(['zutaten_mengen_structured', 'zutaten_liste']),
                anleitung: find(['herstellung_zubereitung', 'anleitung']),
                prozess: find(['herstellungsprozess'])
            };

            const mid = S(r[COL.id]);
            
            // FIX: Zeilenumbrüche anstelle von "|"
            const formatBlock = (val) => val ? `<div class="block-text">${S(val).replace(/\|/g, '\n')}</div>` : '';
            
            // FIX: "-" anstelle von Bullets
            const zutaten = r[COL.zutaten] ? 
                `<ul class="ingredients-list">${S(r[COL.zutaten]).split('|').map(z => `<li>- ${z.trim()}</li>`).join('')}</ul>` : '';

            container.innerHTML = `
                <article class="recipe">
                    <div class="recipe-id-top">ID: ${mid}</div>
                    <header class="recipe-header">
                        <div class="recipe-img-wrap">
                            <img class="recipe-img" src="./assets/img/mischungen/${mid}.jpg" 
                                 onerror="this.onerror=null; this.src='https://via.placeholder.com/180?text=Kein+Bild';">
                        </div>
                        <div class="recipe-header-text">
                            <h2 class="recipe-title">${S(r[COL.name])}</h2>
                            <div class="recipe-meta">
                                <strong>Herkunft:</strong> ${S(r[COL.origin])}<br>
                                <strong>Sensorik:</strong> ${S(r[COL.sensorik])}
                            </div>
                        </div>
                    </header>

                    <h3 class="section-title">Zutaten & Mengen</h3>
                    ${zutaten}

                    ${r[COL.anleitung] ? `<h3 class="section-title">Herstellung / Zubereitung (Anleitung)</h3>${formatBlock(r[COL.anleitung])}` : ''}
                    ${r[COL.prozess] ? `<h3 class="section-title">Herstellungsprozess</h3>${formatBlock(r[COL.prozess])}` : ''}
                </article>
            `;

            if (currentData.length > 1) {
                navContainer.innerHTML = `
                    <button onclick="render(${index-1})" ${index === 0 ? 'disabled' : ''}>&larr; Zurück</button>
                    <span>Rezept ${index+1} von ${currentData.length}</span>
                    <button onclick="render(${index+1})" ${index === currentData.length-1 ? 'disabled' : ''}>Weiter &rarr;</button>
                `;
            } else {
                navContainer.innerHTML = '';
            }
        };

        render(0);
    } catch (e) { container.innerHTML = `<p>Fehler: ${e}</p>`; }
})();
</script>
</body>
</html>
