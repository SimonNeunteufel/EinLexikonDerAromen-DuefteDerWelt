<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexikon – Rezeptansicht</title>
    <style>
        :root { --t: #f7fafc; --bg: #ffffff; --b: #00000020; --accent: #007bff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, sans-serif; color: #333; background: #f4f4f4; line-height: 1.5; }
        .page { max-width: 900px; margin: 20px auto; padding: 40px; background: var(--bg); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        
        /* ID oben rechts wie gewünscht */
        .recipe-id-tag { position: absolute; top: 40px; right: 40px; font-size: 0.85rem; color: #999; font-family: monospace; }
        
        .btn-back { display: block; margin-bottom: 20px; color: var(--accent); text-decoration: none; }
        .recipe-header { display: flex; gap: 30px; margin-bottom: 40px; align-items: flex-start; }
        .recipe-title { margin: 0; font-size: 2.2rem; color: #000; padding-right: 120px; }
        
        /* Bild-Container wie in der funktionierenden Version */
        .recipe-img-wrap { width: 180px; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--b); flex-shrink: 0; background: #f0f0f0; }
        .recipe-img { width: 100%; height: 100%; object-fit: cover; }
        .meta-info { margin-top: 10px; color: #666; font-size: 0.95rem; }

        .section-title { font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 8px; margin: 30px 0 15px 0; color: #000; font-weight: bold; }
        /* Box für Textblöcke mit automatischen Zeilenumbrüchen */
        .block-text { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; white-space: pre-wrap; }
        .ingredients-list { list-style: none; padding: 0; margin: 0; }
        .ingredients-list li { padding: 4px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="page">
    <div id="id-tag" class="recipe-id-tag"></div>
    <a href="./mischungen.html" class="btn-back">← Zurück zur Suche</a>
    <div id="recipe-navigation" style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center;"></div>
    <div id="recipes">Lade Daten...</div>
</div>

<script src="./assets/js/util.js"></script>
<script>
(async () => {
    const container = document.getElementById('recipes');
    const navContainer = document.getElementById('recipe-navigation');
    const idTag = document.getElementById('id-tag');
    const S = window.$util.safe;

    try {
        const allData = await window.$util.loadRecipes();
        const params = new URLSearchParams(location.search);
        const ids = (params.get('ids') || params.get('id') || "").split(',').filter(Boolean);

        const byId = new Map(allData.map(r => [r.mix_id || r.id_neu, r]));
        const currentData = ids.length > 0 ? ids.map(id => byId.get(id)).filter(Boolean) : [allData[0]];

        window.renderRecipe = function(index) {
            const r = currentData[index];
            const keys = Object.keys(r);
            const find = (c) => c.find(k => keys.includes(k.toLowerCase())) || null;

            const COL = {
                name: find(['name_deutsch', 'mix_name']),
                origin: find(['region_norm', 'herkunft']),
                sensorik: find(['sensorik', 'sensorik_multi']),
                zutaten: find(['zutaten_mengen_structured', 'zutaten_liste']),
                anleitung: find(['herstellung_zubereitung', 'anleitung']),
                prozess: find(['herstellungsprozess']),
                id: find(['mix_id', 'id_neu'])
            };

            const recipeId = S(r[COL.id]);
            idTag.textContent = `ID: ${recipeId}`; // ID oben rechts

            // Fix: Trenner "|" durch "-" ersetzen bei Zutaten
            const zutatenHtml = r[COL.zutaten] ? 
                `<ul class="ingredients-list">${r[COL.zutaten].split('|').map(z => `<li>- ${S(z)}</li>`).join('')}</ul>` : '';

            // Fix: Pfad zu den Bildern wie in der funktionierenden Version
            const imgPath = `./assets/img/mischungen/${recipeId}.jpg`;

            container.innerHTML = `
                <article class="recipe">
                    <div class="recipe-header">
                        <div class="recipe-img-wrap">
                            <img class="recipe-img" src="${imgPath}" 
                                 onerror="this.onerror=null; this.src='https://via.placeholder.com/180?text=Kein+Bild';">
                        </div>
                        <div>
                            <h1 class="recipe-title">${S(r[COL.name])}</h1>
                            <div class="meta-info">
                                <strong>Herkunft:</strong> ${S(r[COL.origin])}<br>
                                <strong>Sensorik:</strong> ${S(r[COL.sensorik])}
                            </div>
                        </div>
                    </div>

                    <h3 class="section-title">Zutaten & Mengen</h3>
                    ${zutatenHtml}
                    
                    ${r[COL.anleitung] ? `<h3 class="section-title">Herstellung / Zubereitung</h3><div class="block-text">${S(r[COL.anleitung]).replace(/\|/g, '\n')}</div>` : ''}
                    ${r[COL.prozess] ? `<h3 class="section-title">Herstellungsprozess</h3><div class="block-text">${S(r[COL.prozess]).replace(/\|/g, '\n')}</div>` : ''}
                </article>
            `;

            if (currentData.length > 1) {
                navContainer.innerHTML = `
                    <button onclick="renderRecipe(${index-1})" ${index===0?'disabled':''}>←</button>
                    <span>${index+1} / ${currentData.length}</span>
                    <button onclick="renderRecipe(${index+1})" ${index===currentData.length-1?'disabled':''}>→</button>
                `;
            }
        };

        renderRecipe(0);
    } catch (e) { container.innerHTML = `<p>Fehler: ${e}</p>`; }
})();
</script>
</body>
</html>
