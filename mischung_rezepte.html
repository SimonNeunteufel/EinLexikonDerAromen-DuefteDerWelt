<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Rezeptansicht</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #eef2f6; color: #333; line-height: 1.6; }
        .page-container { max-width: 900px; margin: 30px auto; padding-bottom: 60px; }
        .page { 
            background: white; padding: 50px; border-radius: 8px; position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 40px; page-break-after: always; 
        }

        .rid { position: absolute; top: 30px; right: 30px; font-size: 0.85em; color: #bbb; font-family: monospace; }
        .header { display: flex; gap: 30px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .img-box { 
            width: 220px; height: 220px; background: #f8f9fa; border-radius: 12px; 
            overflow: hidden; flex-shrink: 0; border: 1px solid #e5e7eb; box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
            display: flex; align-items: center; justify-content: center; cursor: zoom-in;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .title-box { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .badge { display: inline-block; align-self: flex-start; background: #e0e7ff; color: #4338ca; padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 2.4em; color: #111827; line-height: 1.2; letter-spacing: -0.5px; }
        h2 { margin: 5px 0 15px 0; font-size: 1.3em; font-weight: 400; color: #6b7280; font-style: italic; }
        .origin { font-size: 0.95em; color: #4b5563; display: flex; align-items: center; gap: 6px; }
        
        .content-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; }
        h3 { font-size: 0.95em; text-transform: uppercase; letter-spacing: 1.5px; color: #9ca3af; border-bottom: 1px solid #eee; padding-bottom: 5px; margin: 0 0 15px 0; }
        ul.ing-list { list-style: none; padding: 0; margin: 0; }
        ul.ing-list li { padding: 8px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; font-size: 0.95em; }
        .step { position: relative; padding-left: 40px; margin-bottom: 15px; color: #374151; }
        .step::before { content: "•"; position: absolute; left: 0; top: 0; width: 28px; height: 28px; background: #f3f4f6; color: #374151; border-radius: 50%; text-align: center; line-height: 28px; font-weight: bold; }

        /* Lightbox Fix (Overlay auf ganzer Seite) */
        .lightbox { display:none; position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .lightbox img { max-width:90%; max-height:90%; box-shadow:0 0 30px rgba(0,0,0,0.5); border: 3px solid white; }

        #nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; gap: 20px; z-index: 100; align-items: center; }
        #nav-container button { padding: 8px 16px; cursor: pointer; border: none; background: #1f2937; color: white; border-radius: 20px; font-weight: 500; }
        #nav-container button:disabled { background: #ccc; cursor: not-allowed; }

        @media print {
            body { background: white; }
            .page { box-shadow: none; margin: 0; border: none; padding: 20px; }
            .no-print, #nav-container, .lightbox { display: none !important; }
        }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<div class="no-print" style="max-width:900px; margin:20px auto; display:flex; justify-content:space-between;">
    <button class="btn" onclick="location.href='./mischungen.html'">← Zurück</button>
    <button class="btn" onclick="window.print()">Drucken / PDF</button>
</div>

<div id="nav-container" class="no-print" style="display:none"></div>
<div id="container" class="page-container">Lade Daten...</div>

<div id="lb" class="lightbox" onclick="this.style.display='none'">
    <img id="lb-img" src="" alt="Vergrößerung">
</div>

<script src="./assets/js/util.js"></script>
<script>
function openLightbox(src) {
    const lb = document.getElementById('lb');
    const img = document.getElementById('lb-img');
    img.src = src;
    lb.style.display = 'flex';
}

let currentIndex = 0;
let currentData = [];

(async () => {
    const params = new URLSearchParams(window.location.search);
    const ids = (params.get('ids') || params.get('id') || "").split(',').map(i => i.trim()).filter(Boolean);

    if (!ids.length) {
        document.getElementById('container').innerHTML = '<p style="text-align:center;padding:50px">Keine Rezepte ausgewählt.</p>';
        return;
    }

    try {
        const allData = await window.$util.loadCsv('./assets/data/MasterRecipes.csv');
        currentData = ids.map(id => allData.find(r => r.MIX_ID === id)).filter(Boolean);
        if (!currentData.length) return;
        renderRecipe(0);
    } catch (e) { console.error(e); }
})();

function renderRecipe(index) {
    if (index < 0 || index >= currentData.length) return;
    currentIndex = index;
    const r = currentData[index];
    const S = (t) => t ? String(t) : "";
    const L = (t) => t ? String(t).split('|').map(x => x.trim()).filter(Boolean) : [];

    let imgFile = r.MIX_ID + '.jpg';
    if (r.Platzhalter_Illu && (r.Platzhalter_Illu.includes('.jpg') || r.Platzhalter_Illu.includes('.png'))) {
        imgFile = r.Platzhalter_Illu;
    }
    const imgSrc = `./assets/img/mischungen/${imgFile}`;

    let noteText = "";
    if (r.Gemini_Comment2) noteText = r.Gemini_Comment2.replace(/\[Image.*?\]/g, '').replace(/^\|/, '').trim();

    const html = `
        <div class="page">
            <div class="rid">${r.MIX_ID}</div>
            <div class="header">
                <div class="img-box" onclick="openLightbox('${imgSrc}')">
                    <img src="${imgSrc}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                    <div class="img-placeholder" style="display:none">Kein Bild<br><small>${imgFile}</small></div>
                </div>
                <div class="title-box">
                    <span class="badge">${S(r.Art) || 'Mischung'}</span>
                    <h1>${S(r.Name_DE)}</h1>
                    <h2>${S(r.Name_Original)}</h2>
                    <div class="origin">📍 ${S(r.Herkunft_Hierarchie).replace('>', '›')}</div>
                </div>
            </div>
            <div class="content-grid">
                <div class="left">
                    <h3>Zutaten</h3>
                    <ul class="ing-list">${L(r.Zutaten_Tags).map(z => `<li>${z}</li>`).join('') || '<li>Keine Angaben</li>'}</ul>
                </div>
                <div class="right">
                    <h3>Zubereitung</h3>
                    <div>${L(r.Herstellung_Zubereitung_Schritte).map(s => `<div class="step">${s}</div>`).join('') || '<div>Keine Anleitung verfügbar.</div>'}</div>
                    ${r.Anwendungstext ? `<div class="app-note"><strong>Anwendung:</strong> ${S(r.Anwendungstext)}</div>` : ''}
                    ${noteText ? `<div class="special-note">💡 ${noteText}</div>` : ''}
                </div>
            </div>
            <div class="footer-info">
                <div class="f-item"><strong>Haltbarkeit</strong><br>${S(r.Haltbarkeit_Monate)} Mon.</div>
                <div class="f-item"><strong>Lagerung</strong><br>${S(r.Aufbewahrung)}</div>
                <div class="f-item"><strong>Methode</strong><br>${S(r.Herstellungsmethode)}</div>
            </div>
        </div>
    `;

    document.getElementById('container').innerHTML = html;
    window.scrollTo(0, 0);

    const nav = document.getElementById('nav-container');
    if (currentData.length > 1) {
        nav.style.display = 'flex';
        nav.innerHTML = `
            <button onclick="window.changePage(-1)" ${currentIndex === 0 ? 'disabled' : ''}>← Vorheriges</button>
            <span style="font-weight:bold; color:#333">${currentIndex + 1} / ${currentData.length}</span>
            <button onclick="window.changePage(1)" ${currentIndex === currentData.length - 1 ? 'disabled' : ''}>Nächstes →</button>
        `;
    }
}
window.changePage = (dir) => { renderRecipe(currentIndex + dir); };
</script>
</body>
</html>
