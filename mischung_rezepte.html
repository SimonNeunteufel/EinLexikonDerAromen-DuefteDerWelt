<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>
<script>
(async () => {
    const params = new URLSearchParams(location.search);
    const idsParam = params.get('ids') || params.get('id') || ''; 
    const idList = idsParam.split(',').map(s => s.trim()).filter(Boolean);

    const printMode = params.get('print') === '1';

    if (!idList.length) {
        document.getElementById('recipes').innerHTML =
            '<p>Keine Mischungen ausgewählt.</p>';
        return;
    }

    let data = [];
    try {
        data = await $util.loadRecipes(); // Daten laden
    } catch (e) {
        $util.err('Rezepte konnten nicht geladen werden.');
        return;
    }

    if (!data.length) {
        document.getElementById('recipes').innerHTML =
            '<p>Keine Rezepte gefunden.</p>';
        return;
    }

    const S = $util.safe;
    const sample = data[0] || {};
    const KEYS = Object.keys(sample);
    
    const findCol = (candidates) =>
        candidates.find(c => KEYS.includes(c)) || null;

    // --- PRÄZISIERTE SPALTEN-MAPPING (Kopiert aus mischungen.js) ---
    const COL = {
        // IDs & Metadaten (für Header)
        id: findCol(['MIX_ID', 'Mix_ID', 'ID_Neu', 'Recipe_ID', 'Rezept_ID', 'id']),
        name: findCol(['Name_deutsch', 'Original_Name', 'Mix_Name', 'Mischungsname', 'Mischung_Name']),
        category: findCol(['Anwendungsbereich_multi', 'Kategorie_multi', 'Mix_Typ', 'Kategorie', 'Mischungskategorie']),
        sensorik: findCol(['Sensorik_multi', 'SensorikProfil', 'Sensorik_Profil', 'Sensorik']),
        origin: findCol(['Region_norm', 'Original_Region', 'Herkunft', 'Region_Summary']),
        illu: findCol(['PlH_Illu', 'Illu', 'Bildname']),
        
        // --- REZEPTUR-DETAIL-SPALTEN (fehlt im Original-Skript) ---
        zutaten: findCol(['Zutaten_Mengen_Structured', 'Zutaten_Liste']),
        anleitung: findCol(['Herstellung_Zubereitung', 'Anleitung']),
        prozess: findCol(['Herstellungsprozess']),
        temperatur: findCol(['Temperaturfuehrung']),
        reifezeit: findCol(['Reifezeit_Lagerzeit']),
        anwendung: findCol(['Anwendung'])
    };
    
    function getId(r) {
        return (COL.id && r[COL.id]) || '';
    }

    const byId = new Map(data.map(r => [getId(r), r]));
    const selected = idList.map(id => byId.get(id)).filter(Boolean);

    // Hilfsfunktion zur Darstellung der Zutaten (nimmt Pipe | oder \n)
    function ingredientList(txt) {
        if (!txt) return '';
        // Hier verwenden wir das Pipe-Trennzeichen | aus der CSV
        const items = (txt + '').split('|').map(s => s.trim()).filter(Boolean);
        if (!items.length) return '';
        return '<ul class="ingredients-list">' +
            items.map(x => '<li>' + S(x) + '</li>').join('') +
            '</ul>';
    }

    const container = document.getElementById('recipes');

    container.innerHTML = selected.map(r => {
        const name = S(r[COL.name] || 'Unbekannte Mischung');
        const cat = COL.category ? S(r[COL.category] || '') : '';
        const origin = COL.origin ? S(r[COL.origin] || '') : '';
        const sens = COL.sensorik ? S(r[COL.sensorik] || '') : '';
        const id = getId(r);

        // --- Extrahieren der Details mit neuem Mapping ---
        const zutaten = COL.zutaten ? ingredientList(r[COL.zutaten]) : '';
        const herst = COL.anleitung && r[COL.anleitung] ? '<div class="block-text">' + S(r[COL.anleitung]) + '</div>' : '';
        const proc = COL.prozess && r[COL.prozess] ? '<div class="block-text">' + S(r[COL.prozess]) + '</div>' : '';
        const temp = COL.temperatur && r[COL.temperatur] ? '<div class="block-text">' + S(r[COL.temperatur]) + '</div>' : '';
        const reife = COL.reifezeit && r[COL.reifezeit] ? '<div class="block-text">' + S(r[COL.reifezeit]) + '</div>' : '';
        const anw = COL.anwendung && r[COL.anwendung] ? '<div class="block-text">' + S(r[COL.anwendung]) + '</div>' : '';

        // Bild-Pfad (PlH_Illu wird nun über das Mapping gefunden)
        const illu = COL.illu && r[COL.illu] ? S(r[COL.illu]) : '';
        const imgHtml = illu
            ? `<div class="recipe-img-wrap">
                   <img class="recipe-img"
                        src="./assets/img/mischungen/${illu}.jpg"
                        alt="${name}"
                        onerror="this.style.display='none'">
               </div>`
            : '';

        return `
            <article class="recipe" data-id="${id}">
                <header class="recipe-header">
                    ${imgHtml}
                    <div class="recipe-header-text">
                        <h2 class="recipe-title">${name}</h2>
                        <div class="recipe-meta">
                            ${origin ? 'Herkunft: ' + origin + '<br>' : ''}
                            ${cat ? 'Kategorie: ' + cat + '<br>' : ''}
                            ${sens ? 'Sensorik: ' + sens : ''}
                        </div>
                        <div class="recipe-meta">ID: ${S(id)}</div>
                    </div>
                </header>

                ${zutaten ? '<h3 class="section-title">Zutaten &amp; Mengen</h3>' + zutaten : ''}

                ${herst ? '<h3 class="section-title">Herstellung / Zubereitung (Anleitung)</h3>' + herst : ''}
                ${proc ? '<h3 class="section-title">Herstellungsprozess</h3>' + proc : ''}
                ${temp ? '<h3 class="section-title">Temperaturführung</h3>' + temp : ''}
                ${reife ? '<h3 class="section-title">Reifezeit / Lagerzeit</h3>' + reife : ''}
                ${anw ? '<h3 class="section-title">Anwendung</h3>' + anw : ''}
            </article>
        `;
    }).join('');

    if (printMode) {
        setTimeout(() => window.print(), 500);
    }
})();
</script>
