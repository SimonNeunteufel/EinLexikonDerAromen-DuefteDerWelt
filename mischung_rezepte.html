<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>
<script>
(async () => {
    // --- Initialisierung & Datenabruf ---
    const params = new URLSearchParams(location.search);
    const idToLoad = params.get('id') || params.get('ids')?.split(',')[0] || ''; 
    
    const container = document.getElementById('recipes');
    const navContainer = document.getElementById('recipe-navigation');
    const S = window.$util.safe;
    let allData = [];

    // Navigationscontainer ausblenden, um sich auf das Einzelrezept zu konzentrieren
    if(navContainer) navContainer.style.display = 'none';

    if (!idToLoad) {
        container.innerHTML = '<p>Bitte wähle eine Mischung in der Suchtabelle aus.</p>';
        return;
    }

    try {
        allData = await $util.loadRecipes(); 
    } catch (e) {
        container.innerHTML = `<p>KRITISCHER LADEFEHLER: Die Daten konnten nicht geladen werden. (${e})</p>`;
        return;
    }

    const sample = allData[0] || {};
    const KEYS = Object.keys(sample);
    const findCol = (candidates) => candidates.find(c => KEYS.includes(c.toLowerCase())) || null;

    // --- SPALTEN-MAPPING ---
    const COL = {
        id: findCol(['mix_id', 'id_neu']),
        name: findCol(['name_deutsch']),
        category: findCol(['kategorie_multi']),
        sensorik: findCol(['sensorik', 'sensorik_multi']),
        origin: findCol(['region_norm', 'herkunft']),
        illu: findCol(['plh_illu', 'bildname']),
        zutaten: findCol(['zutaten_mengen_structured', 'zutaten_liste']),
        anleitung: findCol(['herstellung_zubereitung']), 
        prozess: findCol(['herstellungsprozess']),
        reifezeit: findCol(['reifezeit_lagerzeit']),
        anwendung: findCol(['anwendung'])
    };

    function getId(r) { return (COL.id && r[COL.id]) || ''; }

    const selectedRecipe = allData.find(r => getId(r) === idToLoad);

    if (!selectedRecipe) {
        container.innerHTML = `<p>FEHLER: Mischung mit ID "${idToLoad}" konnte nicht in den Daten gefunden werden.</p>`;
        return;
    }

    // --- RENDERING-HELPER ---
    function ingredientList(txt) {
        if (!txt) return '';
        // FIX: Nur Pipe (|) als Trenner verwenden, um Semikolon-Konflikte zu vermeiden
        const items = (txt + '').split(/\|/).map(s => s.trim()).filter(Boolean); 
        if (!items.length) return '';
        return '<ul class="ingredients-list">' + items.map(x => '<li>' + S(x) + '</li>').join('') + '</ul>';
    }

    function renderBlock(titleKey, dataField) {
        if (!dataField) return '';
        // FIX: dataField muss bereits sicher S(r[COL.key]) sein
        const content = dataField; 
        
        // FIX: Fügt die korrekten H3-Titel und den div.block-text Container hinzu
        return `
            <h3 class="section-title">${titleKey}</h3>
            <div class="block-text">${content}</div>
        `;
    }

    // --- DATEN RENDERN ---
    const r = selectedRecipe;
    const name = S(r[COL.name] || 'Unbekannte Mischung');
    const id = getId(r);
    const illuId = COL.illu && S(r[COL.illu]) ? S(r[COL.illu]) : id; 

    // Rendere Details
    const zutatenBlock = COL.zutaten && S(r[COL.zutaten]) 
        ? '<h3 class="section-title">Zutaten &amp; Mengen</h3>' + ingredientList(S(r[COL.zutaten]))
        : '';
        
    const herstellungBlock = COL.anleitung && S(r[COL.anleitung]) 
        ? renderBlock('Herstellung / Zubereitung (Anleitung)', S(r[COL.anleitung])) 
        : '';
        
    const prozessBlock = COL.prozess && S(r[COL.prozess]) 
        ? renderBlock('Herstellungsprozess', S(r[COL.prozess])) 
        : '';

    const reifezeitBlock = COL.reifezeit && S(r[COL.reifezeit])
        ? renderBlock('Reifezeit / Lagerzeit', S(r[COL.reifezeit]))
        : '';
        
    const anwendungBlock = COL.anwendung && S(r[COL.anwendung])
        ? renderBlock('Anwendung / Verwendung', S(r[COL.anwendung]))
        : '';


    container.innerHTML = `
        <article class="recipe" data-id="${id}">
            <header class="recipe-header">
                ${illuId ? `<div class="recipe-img-wrap"><img class="recipe-img" src="./assets/img/mischungen/${illuId}.jpg" alt="${name}" onerror="this.style.display='none'"></div>` : ''}
                <div class="recipe-header-text">
                    <h2 class="recipe-title">${name}</h2>
                    <div class="recipe-meta">
                        ${COL.origin && S(r[COL.origin]) ? 'Herkunft: ' + S(r[COL.origin]) + '<br>' : ''}
                        ${COL.category && S(r[COL.category]) ? 'Kategorie: ' + S(r[COL.category]) + '<br>' : ''}
                        ${COL.sensorik && S(r[COL.sensorik]) ? 'Sensorik: ' + S(r[COL.sensorik]) : ''}
                    </div>
                    <div class="recipe-meta">ID: ${S(id)}</div>
                </div>
            </header>
            
            ${zutatenBlock}
            ${herstellungBlock}
            ${prozessBlock}
            ${reifezeitBlock}
            ${anwendungBlock}
        </article>
    `;
    
})();
</script>
