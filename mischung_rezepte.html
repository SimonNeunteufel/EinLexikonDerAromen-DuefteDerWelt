<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mischungen – Rezepte</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <style>
    .recipe-page {
      padding: 1.5rem 1.5rem 2rem;
      max-width: 980px;
      margin: 0 auto;
    }
    .recipe {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .recipe-header {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .recipe-header-text {
      flex: 1 1 260px;
    }
    .recipe-title {
      font-size: 1.6rem;
      margin: 0 0 0.3rem;
    }
    .recipe-meta {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-bottom: 0.4rem;
    }
    .recipe-img-wrap {
      flex: 0 0 220px;
      max-width: 260px;
    }
    .recipe-img {
      width: 100%;
      border-radius: 12px;
      display: block;
      object-fit: cover;
    }
    .section-title {
      margin-top: 1.2rem;
      margin-bottom: 0.2rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .ingredients-list {
      margin: 0.2rem 0 0.8rem;
      padding-left: 1.1rem;
      font-size: 0.95rem;
    }
    .ingredients-list li {
      margin: 0.1rem 0;
    }
    .block-text {
      font-size: 0.95rem;
      line-height: 1.4;
      white-space: pre-wrap;
      margin: 0.15rem 0 0.7rem;
    }
    @media print {
      body {
        background: #fff;
      }
      .recipe-page {
        padding: 0.5cm 1cm;
        max-width: none;
      }
      .recipe {
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body class="BG4">
<div class="page">
  <div class="header">
    <button class="btn" onclick="history.back()">← Zurück</button>
    <div class="brand">Mischungen – Rezepte</div>
  </div>

  <div class="recipe-page" id="recipes"></div>

  <div class="footer-note">
    <div>© Lexikon</div>
    <div><a href="./index.html">Start</a></div>
  </div>
</div>

<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const idsParam = params.get('ids') || '';
  const idList = idsParam.split(',').map(s => s.trim()).filter(Boolean);

  const printMode = params.get('print') === '1';

  if (!idList.length) {
    document.getElementById('recipes').innerHTML =
      '<p>Keine Mischungen ausgewählt.</p>';
    return;
  }

  let data = [];
  try {
    data = await $util.loadRecipes();
  } catch (e) {
    $util.err('Rezepte konnten nicht geladen werden.');
    return;
  }

  if (!data.length) {
    document.getElementById('recipes').innerHTML =
      '<p>Keine Rezepte gefunden.</p>';
    return;
  }

  const S = $util.safe;

  function getId(r) {
    return r.MIX_ID || r.ID_Neu || r.Recipe_ID || r.Rezept_ID || r.id || '';
  }

  const byId = new Map(data.map(r => [getId(r), r]));
  const selected = idList.map(id => byId.get(id)).filter(Boolean);

  const COL_NAME   = 'Mix_Name';
  const COL_CAT    = data[0].Mix_Typ       ? 'Mix_Typ'
                     : data[0].Kategorie   ? 'Kategorie'
                     : '';
  const COL_REGION = data[0].Region        ? 'Region' : '';
  const COL_LAND   = data[0].Land          ? 'Land'   : '';
  const COL_SENSOR = data[0].SensorikProfil ? 'SensorikProfil'
                     : data[0].Sensorik    ? 'Sensorik'
                     : '';

  const COL_ZUTATEN   = 'Zutaten_Mengen_Structured';
  const COL_HERSTELL  = 'Herstellung_Zubereitung';
  const COL_PROC      = 'Herstellungsprozess';
  const COL_TEMP      = 'Temperaturfuehrung';
  const COL_REIFE     = 'Reifezeit_Lagerzeit';
  const COL_ANW       = 'Anwendung';
  const COL_ILLU      = 'PlH_Illu';

  function originOf(r) {
    const parts = [];
    if (COL_REGION && r[COL_REGION]) parts.push(S(r[COL_REGION]));
    if (COL_LAND   && r[COL_LAND])   parts.push(S(r[COL_LAND]));
    return parts.join(' – ');
  }

  function ingredientList(txt) {
    if (!txt) return '';
    // CSV-artige Struktur: mit "|" getrennt → als Liste darstellen
    const items = (txt + '').split('|').map(s => s.trim()).filter(Boolean);
    if (!items.length) return '';
    return '<ul class="ingredients-list">' +
      items.map(x => '<li>' + S(x) + '</li>').join('') +
      '</ul>';
  }

  const container = document.getElementById('recipes');

  container.innerHTML = selected.map(r => {
    const name   = S(r[COL_NAME] || '');
    const cat    = COL_CAT    ? S(r[COL_CAT]    || '') : '';
    const origin = originOf(r);
    const sens   = COL_SENSOR ? S(r[COL_SENSOR] || '') : '';
    const id     = getId(r);

    const zutaten = ingredientList(r[COL_ZUTATEN]);
    const herst   = r[COL_HERSTELL] ? '<div class="block-text">' + S(r[COL_HERSTELL]) + '</div>' : '';
    const proc    = r[COL_PROC]     ? '<div class="block-text">' + S(r[COL_PROC])     + '</div>' : '';
    const temp    = r[COL_TEMP]     ? '<div class="block-text">' + S(r[COL_TEMP])     + '</div>' : '';
    const reife   = r[COL_REIFE]    ? '<div class="block-text">' + S(r[COL_REIFE])    + '</div>' : '';
    const anw     = r[COL_ANW]      ? '<div class="block-text">' + S(r[COL_ANW])      + '</div>' : '';

    const illu    = r[COL_ILLU] ? S(r[COL_ILLU]) : '';
    const imgHtml = illu
      ? `<div class="recipe-img-wrap">
           <img class="recipe-img"
                src="./assets/img/mischungen/${illu}.jpg"
                alt="${name}"
                onerror="this.style.display='none'">
         </div>`
      : '';

    return `
      <article class="recipe" data-id="${id}">
        <header class="recipe-header">
          <div class="recipe-header-text">
            <h2 class="recipe-title">${name}</h2>
            <div class="recipe-meta">
              ${origin ? 'Herkunft: ' + origin + '<br>' : ''}
              ${cat    ? 'Kategorie: ' + cat + '<br>'     : ''}
              ${sens   ? 'Sensorik: ' + sens             : ''}
            </div>
            <div class="recipe-meta">ID: ${S(id)}</div>
          </div>
          ${imgHtml}
        </header>

        ${zutaten ? '<h3 class="section-title">Zutaten &amp; Mengen</h3>' + zutaten : ''}

        ${herst ? '<h3 class="section-title">Herstellung / Zubereitung</h3>' + herst : ''}
        ${proc  ? '<h3 class="section-title">Herstellungsprozess</h3>'       + proc  : ''}
        ${temp  ? '<h3 class="section-title">Temperaturführung</h3>'        + temp  : ''}
        ${reife ? '<h3 class="section-title">Reifezeit / Lagerzeit</h3>'     + reife : ''}
        ${anw   ? '<h3 class="section-title">Anwendung</h3>'                 + anw   : ''}
      </article>
    `;
  }).join('');

  if (printMode) {
    // Druckansicht automatisch öffnen
    setTimeout(() => window.print(), 500);
  }
})();
</script>
</body>
</html>
