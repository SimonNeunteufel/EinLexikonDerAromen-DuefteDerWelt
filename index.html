
<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ein Lexikon der Aromen & Düfte der Welt</title><link rel="stylesheet" href="./assets/css/styles.css"></head>
<body class="BG1"><div class="page">
  <div class="header">
    <div class="brand">Ein Lexikon der Aromen & Düfte der Welt</div>
    <nav class="nav"><a href="./stoffe.html">Stoffe</a><a href="./mischungen.html">Mischungen</a><a href="./baender.html">Bände</a></nav>
  </div>
  <div class="h1">Willkommen</div>
  <p class="sub">Wähle einen Bereich aus:</p>
  <div class="toolbar" style="justify-content:center">
    <button class="btn" onclick="location.href='./stoffe.html'">🧂 Stoffe – Suchtabelle</button>
    <button class="btn" onclick="location.href='./mischungen.html'">🌿 Mischungen – Suchtabelle</button>
    <button class="btn" onclick="location.href='./baender.html'">📖 Bände – Auswahl</button>
  </div>
  <div class="footer-note">
    <div>© Lexikon • GitHub Pages</div>
    <div id="stats">Lade Datenstatus …</div>
  </div>
</div>
<script src="./assets/js/util.js"></script>
<script>
(async()=>{
  try{
    const idx=await $util.loadCSV('./data/MasterIndex.csv');
    const rec=await $util.loadCSV('./data/MasterRecipes.csv');
    const total=(idx.length+rec.length).toLocaleString('de-CH');
    document.getElementById('stats').textContent=`Einträge gesamt: ${total} • Stoffe: ${idx.length.toLocaleString('de-CH')} • Mischungen: ${rec.length.toLocaleString('de-CH')}`;
  }catch(e){document.getElementById('stats').textContent='Status derzeit nicht verfügbar';}
})();
</script>
</body></html>
