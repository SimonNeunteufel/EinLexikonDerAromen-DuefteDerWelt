<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mischungen – Suche</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <style>
    /* Kopfzeile der Tabelle fixieren */
    .table-wrap {
      max-height: calc(100vh - 260px);
      overflow: auto;
    }
    #t {
      width: 100%;
      border-collapse: collapse;
    }
    #t thead th,
    #t thead td {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(255,255,255,0.95);
    }
    #t th, #t td {
      padding: 0.4rem 0.6rem;
      text-align: left;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    #t td.col-name {
      font-weight: 600;
      white-space: normal;
    }
    #t td.col-origin {
      white-space: normal;
    }
    #t tbody tr:nth-child(2n) {
      background: rgba(0,0,0,0.12);
    }
  </style>
</head>
<body class="BG4">
<div class="page">

  <div class="header">
    <button class="btn" onclick="location.href='./index.html'">← Zurück</button>
    <div class="brand">Mischungen – Suchtabelle</div>
    <nav class="nav">
      <a href="./stoffe.html">Stoffe</a>
      <a href="./mischungen.html">Mischungen</a>
      <a href="./baender.html">Bände</a>
    </nav>
  </div>

  <p class="sub">Mit Varianten- und Rezeptbezug.</p>

  <div class="toolbar">
    <input id="q" placeholder="Suche (Name, Kategorie, Region …)" type="search">
    <button class="btn" id="go">Suchen</button>
    <button class="btn" id="toHtml">Rezepte → HTML</button>
    <button class="btn" id="toPdf">Rezepte → PDF</button>
    <label style="margin-left:auto">
      <input type="checkbox" id="all"> Alles wählen
    </label>
  </div>

  <div class="table-wrap">
    <div class="table-body">
      <table id="t">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="footer-note">
    <div>© Lexikon</div>
    <div><a href="./index.html">Start</a></div>
  </div>

</div>

<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>
<script>
(async () => {
  let data = [];
  try {
    // Lädt MasterRecipes.csv oder master_recipes.json aus /data oder /assets/data
    data = await $util.loadRecipes();
  } catch (e) {
    $util.err('Daten konnten nicht geladen werden. Lege <code>MasterRecipes.csv</code> oder <code>master_recipes.json</code> in <code>/assets/data/</code> oder <code>/data/</code> ab.');
    return;
  }

  if (!data.length) return;

  const S = $util.safe;

  // Spalten-Mapping mit Fallbacks
  const sample = data[0];
  const COL_NAME   = 'Mix_Name';
  const COL_CAT    = sample.Mix_Typ       ? 'Mix_Typ'
                     : sample.Kategorie   ? 'Kategorie'
                     : '';
  const COL_REGION = sample.Region        ? 'Region' : '';
  const COL_LAND   = sample.Land          ? 'Land'   : '';
  const COL_SENSOR = sample.SensorikProfil ? 'SensorikProfil'
                     : sample.Sensorik     ? 'Sensorik'
                     : '';

  function getId(row) {
    return row.MIX_ID || row.ID_Neu || row.Recipe_ID || row.Rezept_ID || row.id || '';
  }

  const thead = document.querySelector('#t thead');
  thead.innerHTML = `
    <tr>
      <th style="width:2.5rem;"><input type="checkbox" id="hd"></th>
      <th>Name</th>
      <th>Herkunft</th>
      <th>Kategorie</th>
      <th>Sensorik</th>
    </tr>
  `;

  const tbody = document.querySelector('#t tbody');

  function originOf(r) {
    const parts = [];
    if (COL_REGION && r[COL_REGION]) parts.push(S(r[COL_REGION]));
    if (COL_LAND   && r[COL_LAND])   parts.push(S(r[COL_LAND]));
    return parts.join(' – ');
  }

  function render(rows) {
    tbody.innerHTML = rows.map(r => {
      const id  = getId(r);
      const name = S(r[COL_NAME] || '');
      const origin = originOf(r);
      const cat = COL_CAT    ? S(r[COL_CAT]    || '') : '';
      const sens = COL_SENSOR ? S(r[COL_SENSOR] || '') : '';

      return `
        <tr>
          <td><input class="sel" type="checkbox" data-id="${id}"></td>
          <td class="col-name">${name}</td>
          <td class="col-origin">${origin}</td>
          <td>${cat}</td>
          <td>${sens}</td>
        </tr>
      `;
    }).join('');
  }

  function search() {
    const q = document.getElementById('q').value.trim().toLowerCase();
    if (!q) {
      render(data);
      return;
    }
    const rows = data.filter(r =>
      Object.values(r).some(v => (S(v) + '').toLowerCase().includes(q))
    );
    render(rows);
  }

  // Erstes Rendering
  render(data);

  // Events
  document.getElementById('go').onclick = search;
  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  // Header-Checkbox "alle"
  document.getElementById('hd').addEventListener('change', e => {
    const checked = e.target.checked;
    document.querySelectorAll('input.sel').forEach(x => x.checked = checked);
    document.getElementById('all').checked = checked;
  });

  // "Alles wählen" in der Toolbar
  document.getElementById('all').addEventListener('change', e => {
    const checked = e.target.checked;
    document.querySelectorAll('input.sel').forEach(x => x.checked = checked);
    document.getElementById('hd').checked = checked;
  });

  function selectedIds() {
    return [...document.querySelectorAll('input.sel:checked')]
      .map(x => x.dataset.id)
      .filter(id => !!id);
  }

  document.getElementById('toHtml').onclick = () => {
    const ids = selectedIds();
    if (!ids.length) {
      alert('Bitte Mischung(en) auswählen.');
      return;
    }
    const qs = encodeURIComponent(ids.join(','));
    window.open(`./mischung_rezepte.html?ids=${qs}`, '_blank');
  };

  document.getElementById('toPdf').onclick = () => {
    const ids = selectedIds();
    if (!ids.length) {
      alert('Bitte Mischung(en) auswählen.');
      return;
    }
    const qs = encodeURIComponent(ids.join(','));
    window.open(`./mischung_rezepte.html?ids=${qs}&print=1`, '_blank');
  };
})();
</script>
</body>
</html>
