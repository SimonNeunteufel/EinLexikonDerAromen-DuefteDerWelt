<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mischungen – Suche</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <style>
    /* Kopfzeile beim Scrollen fixieren */
    .table-wrap {
      max-height: calc(100vh - 260px);
      overflow: auto;
    }
    .table-wrap thead th {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      z-index: 1;
    }
    /* Zellen etwas luftiger für mobile */
    #t td, #t th {
      padding: 0.4rem 0.6rem;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
    #t td:nth-child(1), #t th:nth-child(1) {
      width: 2.5rem;
      text-align: center;
    }
  </style>
</head>
<body class="BG4">
  <div class="page">
    <div class="header">
      <button class="btn" onclick="location.href='./index.html'">← Zurück</button>
      <div class="brand">Mischungen – Suchtabelle</div>
      <nav class="nav">
        <a href="./stoffe.html">Stoffe</a>
        <a href="./mischungen.html">Mischungen</a>
        <a href="./baender.html">Bände</a>
      </nav>
    </div>

    <p class="sub">Mit Varianten- und Rezeptbezug (aus <code>MasterRecipes.csv</code>).</p>

    <div class="toolbar">
      <input id="q" placeholder="Suche (Name, Kategorie, Region …)" type="search">
      <button class="btn" id="go">Suchen</button>
      <button class="btn" id="toHtml">Rezepte → HTML</button>
      <button class="btn" id="toPdf">Rezepte → PDF</button>
      <label style="margin-left:auto">
        <input type="checkbox" id="all"> Alles wählen
      </label>
    </div>

    <div class="table-wrap">
      <div class="table-body">
        <table id="t">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="footer-note">
      <div>© Lexikon</div>
      <div><a href="./index.html">Start</a></div>
    </div>
  </div>

  <script src="./assets/js/util.js"></script>
  <script src="./assets/js/bg_loader.js"></script>
  <script src="./assets/js/mischungen.js"></script>
</body>
</html>
