<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mischungen – Suche</title>
  <link rel="stylesheet" href="./assets/css/styles.css">

  <!-- Zusätzliche Styles für Lesbarkeit & fixen Header -->
  <style>
    .table-wrap {
      margin-top: 1rem;
    }
    .table-body {
      max-height: 60vh;
      overflow: auto;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
    }
    #t {
      width: 100%;
      border-collapse: collapse;
    }
    #t th,
    #t td {
      padding: 0.45rem 0.6rem;
      font-size: 0.9rem;
      text-align: left;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      white-space: nowrap;
    }
    #t th:first-child,
    #t td:first-child {
      text-align: center;
      width: 2.5rem;
      white-space: nowrap;
    }
    /* wirklich fixer Header – Sticky auf TH */
    #t thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(245,245,245,0.98);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body class="BG4">
<div class="page">

  <div class="header">
    <button class="btn" onclick="location.href='./index.html'">← Zurück</button>
    <div class="brand">Mischungen – Suchtabelle</div>
    <nav class="nav">
      <a href="./stoffe.html">Stoffe</a>
      <a href="./mischungen.html">Mischungen</a>
      <a href="./baender.html">Bände</a>
    </nav>
  </div>

  <p class="sub">Mit Varianten- und Rezeptbezug.</p>

  <div class="toolbar">
    <input id="q" placeholder="Scharf, Kategorie, Region …" type="search">
    <button class="btn" id="go">Suchen</button>
    <button class="btn" id="toHtml">Rezepte → HTML</button>
    <button class="btn" id="toPdf">Rezepte → PDF</button>
    <label style="margin-left:auto">
      <input type="checkbox" id="all"> Alles wählen
    </label>
  </div>

  <div class="table-wrap">
    <div class="table-body">
      <table id="t">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="footer-note">
    <div>© Lexikon</div>
    <div><a href="./index.html">Start</a></div>
  </div>

</div>

<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>

<script>
(async () => {
  const S = v => (v == null ? "" : String(v).trim());

  // CSV aus /data/MasterRecipes.csv laden (Semikolon-getrennt)
  async function loadCsv(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    let text = await res.text();
    // BOM ggf. entfernen
    if (text.charCodeAt(0) === 0xFEFF) {
      text = text.slice(1);
    }
    const lines = text.trim().split(/\r?\n/);
    const rows = lines.map(l => l.split(";"));
    return rows;
  }

  let table;
  try {
    // Primär aus /data/, optional Fallback auf /assets/data/
    try {
      table = await loadCsv("./data/MasterRecipes.csv");
    } catch (_) {
      table = await loadCsv("./assets/data/MasterRecipes.csv");
    }
  } catch (e) {
    $util.err(
      'Daten konnten nicht geladen werden. ' +
      'Lege <code>MasterRecipes.csv</code> in <code>/data/</code> oder <code>/assets/data/</code> ab.'
    );
    return;
  }

  if (!table || table.length < 2) {
    $util.err("MasterRecipes.csv enthält keine Daten.");
    return;
  }

  const header = table[0].map(S);
  const rows   = table.slice(1);

  // Hilfsfunktion: Index der ersten vorkommenden Spalte aus einer Liste holen
  const idx = (candidates) => {
    for (const name of candidates) {
      const i = header.indexOf(name);
      if (i !== -1) return i;
    }
    return -1;
  };

  const idxId   = idx(["ID_Neu","Recipe_ID","Rezept_ID","ID","Mix_ID","Mischung_ID","ME_ID","MeID","Code"]);
  const idxName = idx(["Mix_Name","Name_der_Mischung","Name","Rezept_Name"]);
  const idxReg  = idx(["Region","Herkunft","Land","Kontinent"]);
  const idxKat  = idx(["Kategorie","Mix_Typ","Kategorie_Mischung"]);
  const idxSens = idx(["SensorikProfil","Sensorik","Scharfkeit","Schärfe"]);

  // Datenobjekte bauen – nur die 4 relevanten Felder
  const data = rows.map(cells => {
    const name = idxName >= 0 ? S(cells[idxName]) : "";
    const id   = idxId   >= 0 ? S(cells[idxId])   : name;  // Fallback: Name
    return {
      id,
      name,
      region:  idxReg  >= 0 ? S(cells[idxReg])  : "",
      kat:     idxKat  >= 0 ? S(cells[idxKat])  : "",
      sens:    idxSens >= 0 ? S(cells[idxSens]) : ""
    };
  });

  const thead = document.querySelector("#t thead");
  const tbody = document.querySelector("#t tbody");

  // Kopfzeile (ohne Checkbox im Header)
  thead.innerHTML =
    "<tr>" +
      "<th></th>" +
      "<th>Mischung</th>" +
      "<th>Herkunft</th>" +
      "<th>Kategorie</th>" +
      "<th>Sensorik</th>" +
    "</tr>";

  function render(list) {
    tbody.innerHTML = list.map(r => `
      <tr>
        <td><input class="sel" type="checkbox" data-id="${r.id}"></td>
        <td>${S(r.name)}</td>
        <td>${S(r.region)}</td>
        <td>${S(r.kat)}</td>
        <td>${S(r.sens)}</td>
      </tr>
    `).join("");
  }

  function search() {
    const s = document.getElementById("q").value.trim().toLowerCase();
    if (!s) {
      render(data);
      return;
    }
    const filtered = data.filter(r =>
      (r.name   && r.name.toLowerCase().includes(s)) ||
      (r.region && r.region.toLowerCase().includes(s)) ||
      (r.kat    && r.kat.toLowerCase().includes(s)) ||
      (r.sens   && r.sens.toLowerCase().includes(s))
    );
    render(filtered);
  }

  document.getElementById("go").onclick = search;
  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });

  // Alles wählen / abwählen
  document.getElementById("all").addEventListener("change", e => {
    document.querySelectorAll("input.sel").forEach(x => {
      x.checked = e.target.checked;
    });
  });

  function getSelectedIds() {
    return [...document.querySelectorAll("input.sel:checked")]
      .map(x => x.dataset.id)
      .filter(id => id && id.trim().length > 0);
  }

  document.getElementById("toHtml").onclick = () => {
    const ids = getSelectedIds();
    if (!ids.length) {
      alert("Bitte Mischung(en) auswählen.");
      return;
    }
    window.open(
      "./mischung_rezepte.html?ids=" + encodeURIComponent(ids.join(",")),
      "_blank"
    );
  };

  document.getElementById("toPdf").onclick = () => {
    const ids = getSelectedIds();
    if (!ids.length) {
      alert("Bitte Mischung(en) auswählen.");
      return;
    }
    window.open(
      "./mischung_rezepte.html?ids=" + encodeURIComponent(ids.join(",")) + "&print=1",
      "_blank"
    );
  };

  // Anfangs alle Daten anzeigen
  render(data);
})();
</script>

</body>
</html>
