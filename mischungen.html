<script>
  (async () => {
    let data = [];
    try {
      // Nutzt wie bisher MasterRecipes.csv oder master_recipes.json
      data = await $util.loadRecipes();
    } catch (e) {
      $util.err('Daten konnten nicht geladen werden. Lege <code>MasterRecipes.csv</code> oder <code>master_recipes.json</code> in <code>/data/</code> oder <code>/assets/data/</code> ab.');
      return;
    }

    if (!data.length) return;

    // --- Spalten-Analyse ----------------------------------------------------
    const keys = Object.keys(data[0] || {});

    const findCol = (candidates) =>
      candidates.find(c => keys.includes(c)) || null;

    // robuste Erkennung der ID-Spalte (analog mischung_rezepte.html)
    const MIX_ID_KEY =
      keys.find(k => /mix[_\s\-]*id/i.test(k)) ||  // z.B. MIX_ID, Mix_ID, Mix ID
      keys.find(k => /^id$/i.test(k)) ||          // Fallback: Spalte "id"
      null;

    function getId(row) {
      return (MIX_ID_KEY && row[MIX_ID_KEY]) ||
             row.MIX_ID ||
             row.ID_Neu ||
             row.Recipe_ID ||
             row.Rezept_ID ||
             row.id ||
             '';
    }

    // flexible Spaltenzuordnung (unabhängig von leichten Namensunterschieden)
    const COL = {
      // für Anzeige: wenn es eine explizite ID-Spalte gibt, diese verwenden
      id:       MIX_ID_KEY || findCol(['MIX_ID','Mix_ID','ID_Neu','Recipe_ID','Rezept_ID','id']),
      name:     findCol(['Mix_Name','Mischungsname','Mischung_Name','Name']),
      origin:   findCol(['Herkunft','Region','Region_Summary','Herkunft_Summary']),
      category: findCol(['Mix_Typ','Kategorie','Mix_Kategorie','Mischungskategorie']),
      sensorik: findCol(['Sensorik','SensorikProfil','Sensorik_Profil','Sensorik_Profil_Summary'])
    };

    const visibleCols = [
      { key: 'name',     label: 'Mischung' },
      { key: 'origin',   label: 'Herkunft' },
      { key: 'category', label: 'Kategorie' },
      { key: 'sensorik', label: 'Sensorik' }
    ];

    // --- Tabellenkopf -------------------------------------------------------
    const thead = document.querySelector('#t thead');
    thead.innerHTML =
      '<tr><th></th>' +
      visibleCols.map(c => `<th>${c.label}</th>`).join('') +
      '</tr>';

    const tbody = document.querySelector('#t tbody');
    const S = $util.safe;

    // --- Render-Funktion ----------------------------------------------------
    function render(rows) {
      tbody.innerHTML = rows.map(r => {
        const idVal = S(getId(r));   // WICHTIG: ID immer über getId()
        const cells = visibleCols.map(c => {
          const colName = COL[c.key];
          return `<td>${colName ? S(r[colName]) : ''}</td>`;
        }).join('');
        return `<tr>
            <td><input class="sel" type="checkbox" data-id="${idVal}"></td>
            ${cells}
        </tr>`;
      }).join('');
    }

    // --- Suche --------------------------------------------------------------
    function filteredRows() {
      const s = document.getElementById('q').value.trim().toLowerCase();
      if (!s) return data;
      return data.filter(r =>
        Object.values(r).some(v => (S(v) + '').toLowerCase().includes(s))
      );
    }

    document.getElementById('go').onclick = () => render(filteredRows());
    document.getElementById('q').addEventListener('keydown', e => {
      if (e.key === 'Enter') render(filteredRows());
    });

    // "Alles wählen"
    document.getElementById('all').addEventListener('change', e => {
      document.querySelectorAll('input.sel').forEach(x => {
        x.checked = e.target.checked;
      });
    });

    // --- Auswahl & Navigation -----------------------------------------------
    function selectedIds() {
      return [...document.querySelectorAll('input.sel:checked')]
        .map(x => x.dataset.id)
        .filter(Boolean);
    }

    document.getElementById('toHtml').onclick = () => {
      const ids = selectedIds();
      if (!ids.length) {
        alert('Bitte Mischung(en) auswählen.');
        return;
      }
      window.open(
        './mischung_rezepte.html?ids=' + encodeURIComponent(ids.join(',')),
        '_blank'
      );
    };

    document.getElementById('toPdf').onclick = () => {
      const ids = selectedIds();
      if (!ids.length) {
        alert('Bitte Mischung(en) auswählen.');
        return;
      }
      window.open(
        './mischung_rezepte.html?ids=' +
          encodeURIComponent(ids.join(',')) +
          '&print=1',
        '_blank'
      );
    };

    // Initiale Anzeige
    render(data);
  })();
</script>
