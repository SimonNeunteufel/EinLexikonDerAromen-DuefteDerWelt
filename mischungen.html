<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mischungen – Suche</title>
  <link rel="stylesheet" href="./assets/css/styles.css">

  <!-- XLSX-Library zum Lesen von MasterRecipes.xlsx -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Zusatzstyles: gut lesbare Tabelle, fixer Header -->
  <style>
    .table-wrap {
      margin-top: 1rem;
    }
    .table-body {
      max-height: 60vh;
      overflow: auto;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
    }
    #t {
      width: 100%;
      border-collapse: collapse;
    }
    #t th,
    #t td {
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
      text-align: left;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      white-space: nowrap;
    }
    #t th:first-child,
    #t td:first-child {
      text-align: center;
      width: 2.5rem;
      white-space: nowrap;
    }
    /* fixer Header */
    #t thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(245,245,245,0.98);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body class="BG4">
<div class="page">

  <div class="header">
    <button class="btn" onclick="location.href='./index.html'">← Zurück</button>
    <div class="brand">Mischungen – Suchtabelle</div>
    <nav class="nav">
      <a href="./stoffe.html">Stoffe</a>
      <a href="./mischungen.html">Mischungen</a>
      <a href="./baender.html">Bände</a>
    </nav>
  </div>

  <p class="sub">Mit Varianten- und Rezeptbezug (aus MasterRecipes.xlsx).</p>

  <div class="toolbar">
    <input id="q" placeholder="Suche (Name, Herkunft, Kategorie, Sensorik …)" type="search">
    <button class="btn" id="go">Suchen</button>
    <button class="btn" id="toHtml">Rezepte → HTML</button>
    <button class="btn" id="toPdf">Rezepte → PDF</button>
    <label style="margin-left:auto">
      <input type="checkbox" id="all"> Alles wählen
    </label>
  </div>

  <div class="table-wrap">
    <div class="table-body">
      <table id="t">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="footer-note">
    <div>© Lexikon</div>
    <div><a href="./index.html">Start</a></div>
  </div>

</div>

<script src="./assets/js/util.js"></script>
<script src="./assets/js/bg_loader.js"></script>

<script>
(async () => {
  const safe = v => (v == null ? "" : String(v).trim());

  async function loadXlsx(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const ab = await res.arrayBuffer();
    const wb = XLSX.read(ab, { type: "array" });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    // Jede Zeile als Objekt (Header aus erster Zeile)
    return XLSX.utils.sheet_to_json(sheet, { defval: "" });
  }

  let rows;
  try {
    rows = await loadXlsx("./data/MasterRecipes.xlsx");
  } catch (e) {
    $util?.err?.(
      "MasterRecipes.xlsx konnte nicht geladen werden. " +
      "Lege die Datei unter <code>/data/MasterRecipes.xlsx</code> ab."
    );
    console.error(e);
    return;
  }

  if (!rows.length) {
    $util?.err?.("MasterRecipes.xlsx enthält keine Datensätze.");
    return;
  }

  const keys = Object.keys(rows[0]);

  const pickKey = (candidates) => {
    for (const k of candidates) if (keys.includes(k)) return k;
    return null;
  };

  // ▼ HIER bei Bedarf Feldnamen anpassen, falls dein XLSX andere Spaltennamen hat
  const kID   = pickKey(["ID_Neu","Recipe_ID","Rezept_ID","ID","Mix_ID","Mischung_ID","ME_ID","MeID","Code"]);
  const kName = pickKey(["Mix_Name","Name_der_Mischung","Name","Rezept_Name"]);
  const kReg  = pickKey(["Region","Herkunft","Land","Kontinent"]);
  const kKat  = pickKey(["Kategorie","Mix_Typ","Kategorie_Mischung"]);
  const kSens = pickKey(["SensorikProfil","Sensorik","Scharfkeit","Schaerfe","Schärfe"]);

  const data = rows.map(r => {
    const name = kName ? safe(r[kName]) : "";
    const id   = kID   ? safe(r[kID])   : name;   // FallbackName als ID, falls keine ID-Spalte
    return {
      raw:   r,       // komplette Zeile für spätere Nutzung
      id,
      name,
      herkunft: kReg  ? safe(r[kReg])  : "",
      kat:     kKat  ? safe(r[kKat])  : "",
      sens:    kSens ? safe(r[kSens]) : ""
    };
  });

  const thead = document.querySelector("#t thead");
  const tbody = document.querySelector("#t tbody");

  thead.innerHTML =
    "<tr>" +
      "<th></th>" +
      "<th>Mischung</th>" +
      "<th>Herkunft</th>" +
      "<th>Kategorie</th>" +
      "<th>Sensorik</th>" +
    "</tr>";

  function render(list) {
    tbody.innerHTML = list.map(r => `
      <tr>
        <td><input class="sel" type="checkbox" data-id="${r.id}"></td>
        <td>${safe(r.name)}</td>
        <td>${safe(r.herkunft)}</td>
        <td>${safe(r.kat)}</td>
        <td>${safe(r.sens)}</td>
      </tr>
    `).join("");
  }

  function search() {
    const s = document.getElementById("q").value.trim().toLowerCase();
    if (!s) { render(data); return; }
    const filtered = data.filter(r =>
      (r.name     && r.name.toLowerCase().includes(s)) ||
      (r.herkunft && r.herkunft.toLowerCase().includes(s)) ||
      (r.kat      && r.kat.toLowerCase().includes(s)) ||
      (r.sens     && r.sens.toLowerCase().includes(s))
    );
    render(filtered);
  }

  document.getElementById("go").onclick = search;
  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });

  // Alles wählen
  document.getElementById("all").addEventListener("change", e => {
    document.querySelectorAll("input.sel").forEach(x => {
      x.checked = e.target.checked;
    });
  });

  function getSelectedIds() {
    return [...document.querySelectorAll("input.sel:checked")]
      .map(x => x.dataset.id)
      .filter(id => id && id.trim().length > 0);
  }

  document.getElementById("toHtml").onclick = () => {
    const ids = getSelectedIds();
    if (!ids.length) { alert("Bitte Mischung(en) auswählen."); return; }
    window.open(
      "./mischung_rezepte.html?ids=" + encodeURIComponent(ids.join(",")),
      "_blank"
    );
  };

  document.getElementById("toPdf").onclick = () => {
    const ids = getSelectedIds();
    if (!ids.length) { alert("Bitte Mischung(en) auswählen."); return; }
    window.open(
      "./mischung_rezepte.html?ids=" + encodeURIComponent(ids.join(",")) + "&print=1",
      "_blank"
    );
  };

  render(data);
})();
</script>

</body>
</html>
